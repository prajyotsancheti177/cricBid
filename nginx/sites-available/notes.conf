server {
    server_name playground.notes.cricbid.online;
    root  /var/www/apps/notes/frontend;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/playground.notes.cricbid.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/playground.notes.cricbid.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    server_name api.playground.notes.cricbid.online;
    location / {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/playground.notes.cricbid.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/playground.notes.cricbid.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = playground.notes.cricbid.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name playground.notes.cricbid.online;
    return 404; # managed by Certbot


}
server {
    if ($host = api.playground.notes.cricbid.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.playground.notes.cricbid.online;
    return 404; # managed by Certbot


}