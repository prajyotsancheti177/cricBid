# ─────────────────────────────────────────────────────────────────────────────
# CricBid — Production
# cricbid.online / www.cricbid.online  →  React build (static)
# api.cricbid.online                   →  Node backend (port 4000)
# ─────────────────────────────────────────────────────────────────────────────

# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name cricbid.online www.cricbid.online api.cricbid.online;
    return 301 https://$host$request_uri;
}

# Production frontend
server {
    listen 443 ssl;
    server_name cricbid.online www.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/prod/frontend;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

# Production backend API
server {
    listen 443 ssl;
    server_name api.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
