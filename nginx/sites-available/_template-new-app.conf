# ─────────────────────────────────────────────────────────────────────────────
# TEMPLATE — Copy this file to add a new app on cricbid.online
#
# Replace:
#   APP_NAME   →  your app slug (e.g., scorecard, fantasy, dashboard)
#   PORT_PROD  →  unused port for production backend  (e.g., 5000)
#   PORT_STG   →  unused port for staging backend     (e.g., 5001)
#
# Subdomains this creates:
#   playground.APP_NAME.cricbid.online       →  production frontend
#   api.playground.APP_NAME.cricbid.online   →  production backend
#   staging.APP_NAME.cricbid.online          →  staging frontend (optional)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name playground.APP_NAME.cricbid.online api.playground.APP_NAME.cricbid.online;
    return 301 https://$host$request_uri;
}

# Production frontend
server {
    listen 443 ssl;
    server_name playground.APP_NAME.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/apps/APP_NAME/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

# Production backend
server {
    listen 443 ssl;
    server_name api.playground.APP_NAME.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:PORT_PROD;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
