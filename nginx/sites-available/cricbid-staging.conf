# ─────────────────────────────────────────────────────────────────────────────
# CricBid — Staging
# staging.cricbid.online        →  React build (static)
# api.staging.cricbid.online    →  Node backend (port 4001)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name staging.cricbid.online api.staging.cricbid.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name staging.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/staging/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}

server {
    listen 443 ssl;
    server_name api.staging.cricbid.online;

    ssl_certificate     /etc/letsencrypt/live/cricbid.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cricbid.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://localhost:4001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
